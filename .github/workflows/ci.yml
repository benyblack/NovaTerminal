name: CI

on:
  pull_request:
    paths-ignore:
      - "documents/**"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "documents/**"
      - "**/*.md"
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  # Opt into Node.js 24 now; GitHub Actions will force this on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Prevent dotnet/MSBuild daemons from outliving each step and holding the
  # GitHub Actions runner's redirected stdout/stderr pipes open. Without these,
  # Linux Unit Tests has historically hung after tests completed because the
  # MSBuild worker pool spawned by `dotnet test` (and any nested `dotnet build`
  # inside tests like VtReportCliTests) kept the pipe alive past the step
  # timeout. UseSharedCompilation is also disabled globally via
  # Directory.Build.props, but these env vars cover the driver-level daemons
  # (MSBuild build server, MSBuild worker node reuse) that project files
  # cannot influence.
  DOTNET_CLI_USE_MSBUILD_SERVER: '0'
  MSBUILDDISABLENODEREUSE: '1'

jobs:
  # Native FFI unit/integration tests (handle registry, abuse suite, alloc balance).
  # The per-OS build job only `cargo build`s the crates; the cargo test suites
  # (rusty_ssh fail-closed handle tests + rusty_pty cancel tests) run here.
  rust-ffi-tests:
    name: Rust FFI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust incremental build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/NovaTerminal.App/native
            src/NovaTerminal.App/native/rusty_ssh
      - name: rusty_ssh FFI tests (registry, abuse suite, alloc balance)
        run: cargo test --manifest-path src/NovaTerminal.App/native/rusty_ssh/Cargo.toml
      - name: rusty_pty FFI tests
        run: cargo test --manifest-path src/NovaTerminal.App/native/Cargo.toml

  # Single build job per OS: Rust native + .NET in one step.
  # Eliminates the artifact round-trip that the old build_native → build_dotnet split required.
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event_name == 'workflow_dispatch' && '["windows-latest","ubuntu-latest","macos-latest"]' || '["windows-latest","ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust native ────────────────────────────────────────────────────────────
      # Cache the compiled binary keyed on all Rust source files.
      # On a hit the toolchain install, Swatinem, and cargo build are all skipped.
      # Cache both target/release and target_linux/release: the Linux csproj
      # consumes the .so from target_linux/release, so it must be part of the
      # cache or a cache hit leaves the staged path empty and the Build step
      # below is skipped. Key bumped to v2 to invalidate caches that only
      # contained target/release.
      - name: Cache native binary
        id: native-bin-cache
        uses: actions/cache@v4
        with:
          path: |
            src/NovaTerminal.App/native/target/release
            src/NovaTerminal.App/native/target_linux/release
          key: native-bin-v2-${{ matrix.os }}-${{ hashFiles('src/NovaTerminal.App/native/src/**', 'src/NovaTerminal.App/native/Cargo.toml', 'src/NovaTerminal.App/native/Cargo.lock') }}

      - name: Install Rust
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust incremental build cache
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/NovaTerminal.App/native

      - name: Build Rust (Windows)
        if: matrix.os == 'windows-latest' && steps.native-bin-cache.outputs.cache-hit != 'true'
        run: cd src/NovaTerminal.App/native && cargo build --release

      # Linux build also stages the .so into target_linux/release so the
      # cached payload is complete and no separate stage step is needed.
      - name: Build Rust (Linux)
        if: matrix.os == 'ubuntu-latest' && steps.native-bin-cache.outputs.cache-hit != 'true'
        run: |
          cd src/NovaTerminal.App/native
          cargo build --release
          mkdir -p target_linux/release
          cp target/release/librusty_pty.so target_linux/release/

      - name: Build Rust (macOS)
        if: matrix.os == 'macos-latest' && steps.native-bin-cache.outputs.cache-hit != 'true'
        run: cd src/NovaTerminal.App/native && cargo build --release

      # ── .NET ───────────────────────────────────────────────────────────────────
      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      # Upload only the test output directories. src/*/bin/ is 100% duplicated inside
      # tests/NovaTerminal.App.Tests/bin/ (MSBuild copies all referenced DLLs + executables),
      # so including it would double the artifact size for no benefit.
      # VtReportCliTests needs src/NovaTerminal.App/bin/ at runtime — the unit test
      # job restores it from the test output via a symlink/junction (see below).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}
          retention-days: 1
          # upload-artifact@v4 strips the longest common ancestor of all paths, so
          # "tests/" is stripped from both entries here. All download-artifact steps
          # compensate by specifying path: tests to restore the prefix.
          path: |
            tests/NovaTerminal.App.Tests/bin/${{ env.CONFIGURATION }}
            tests/NovaTerminal.Platform.Tests/bin/${{ env.CONFIGURATION }}
            tests/NovaTerminal.Architecture.Tests/bin/${{ env.CONFIGURATION }}
            tests/NovaTerminal.VT.Tests/bin/${{ env.CONFIGURATION }}
            tests/NovaTerminal.Rendering.Tests/bin/${{ env.CONFIGURATION }}

  build_and_unit_tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}
          # upload-artifact@v4 strips the longest common ancestor of all uploaded paths.
          # Both uploaded paths share "tests/" so it gets stripped inside the zip.
          # Downloading to "tests" restores the expected tests/* structure.
          path: tests

      # zip artifacts don't preserve Unix execute bits; restore them so the test host and
      # any app/CLI binaries referenced by tests (NovaTerminal.App, NovaTerminal.Cli) can run.
      - name: Restore execute permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          find tests -path "*/bin/Release/net*" -type f \
            ! -name "*.dll" ! -name "*.json" ! -name "*.pdb" ! -name "*.xml" \
            ! -name "*.so" ! -name "*.dylib" ! -name "*.a" ! -name "*.txt" \
            | xargs chmod +x

      # VtReportCliTests.cs looks for app/CLI binaries in src/*/bin/Release/net10.0/.
      # Every file there is already present in the test output (MSBuild copies all
      # referenced DLLs and the host executable), so we mirror it locally with
      # hardlinks (Linux) or robocopy (Windows) instead of duplicating 1.1 GB in
      # the artifact. Local disk copy is fast; network upload/download is not.
      - name: Reconstruct src bin dirs from test output (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src/NovaTerminal.App/bin/Release src/NovaTerminal.Cli/bin/Release
          cp -rl tests/NovaTerminal.App.Tests/bin/Release/net10.0 src/NovaTerminal.App/bin/Release/net10.0
          cp -rl tests/NovaTerminal.App.Tests/bin/Release/net10.0 src/NovaTerminal.Cli/bin/Release/net10.0

      - name: Reconstruct src bin dirs from test output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "tests\NovaTerminal.App.Tests\bin\Release\net10.0"
          # robocopy exits 0 (nothing to copy) or 1 (files copied) on success; >=8 is an error
          foreach ($dst in @("src\NovaTerminal.App\bin\Release\net10.0", "src\NovaTerminal.Cli\bin\Release\net10.0")) {
            robocopy $src $dst /E /NJH /NJS /NFL /NDL /NC /NS | Out-Null
            if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          }
          exit 0

      - name: Restore
        run: dotnet restore

      # The shell-integration tests under tests/NovaTerminal.App.Tests/CommandAssist/ShellIntegration/Integration
      # spawn real bash/zsh/fish via the production PTY path. bash is
      # preinstalled on ubuntu-latest; zsh and fish are not on ubuntu-24.04,
      # so install them here -- otherwise ZshShellIntegrationTests and
      # FishShellIntegrationTests skip instead of running.
      - name: Install zsh and fish (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fish

      # Gating lane: the non-headless test projects. These are deterministic and
      # MUST pass. The filter drops the lanes that run in their own jobs (replay,
      # render-metrics, pty-smoke, stress, golden-shared-png).
      - name: Test (unit — gating, non-headless projects)
        env:
          SKIP_RUST_NATIVE_BUILD: '1'
        shell: bash
        run: |
          set -e
          filter="Category!=Replay&Category!=RenderMetrics&Category!=PtySmoke&Category!=Stress&Category!=GoldenSharedPng"
          for proj in VT Rendering Architecture Platform; do
            echo "::group::NovaTerminal.$proj.Tests"
            dotnet test "tests/NovaTerminal.$proj.Tests" -c "$CONFIGURATION" --no-build --no-restore \
              --filter "$filter" --logger "trx;LogFileName=unit_${proj}.trx"
            echo "::endgroup::"
          done

      # NON-BLOCKING lane: the Avalonia-headless suite (NovaTerminal.App.Tests).
      # It intermittently deadlocks on a testhost teardown hang — a dump-confirmed
      # framework deadlock in Avalonia.Headless.XUnit 12.0.4 (the latest release),
      # reported upstream as AvaloniaUI/Avalonia#21467 and tracked here as #81. No
      # in-repo config fixes it (collection serialization, maxParallelThreads:1, and
      # ThreadPool.SetMinThreads were all ruled out with dump evidence). Until an
      # upstream fix lands, run it as continue-on-error so the flake can't block PRs,
      # while still executing it: a clean run reports real pass/fail, a genuine
      # regression shows as a failed (non-blocking) check, and each hang writes a
      # mini dump (uploaded below) for ongoing diagnosis.
      - name: Test (headless App.Tests — NON-BLOCKING, see #81 / AvaloniaUI/Avalonia#21467)
        continue-on-error: true
        env:
          SKIP_RUST_NATIVE_BUILD: '1'
        shell: bash
        run: |
          dotnet test tests/NovaTerminal.App.Tests -c "$CONFIGURATION" --no-build --no-restore \
            --filter "Category!=Replay&Category!=RenderMetrics&Category!=PtySmoke&Category!=Stress&Category!=GoldenSharedPng" \
            --blame-hang-timeout 5m --blame-hang-dump-type mini \
            --logger "trx;LogFileName=unit_app.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-${{ runner.os }}
          retention-days: 5
          # *.dmp captures the blame-hang minidump on a teardown hang (#81).
          path: |
            **/*.trx
            **/*.dmp

  golden_shared_png_tests:
    name: Golden Shared PNGs (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 10
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        id: download_golden_build_artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dotnet-build-windows-latest
          path: tests

      - name: Reset partial artifact download
        if: steps.download_golden_build_artifact.outcome == 'failure'
        shell: pwsh
        run: |
          Remove-Item tests\NovaTerminal.App.Tests\bin -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item tests\NovaTerminal.Platform.Tests\bin -Recurse -Force -ErrorAction SilentlyContinue

      - name: Download build artifact (retry)
        if: steps.download_golden_build_artifact.outcome == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-windows-latest
          path: tests

      - name: Restore
        run: dotnet restore

      - name: Run Golden Shared PNG Tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --no-restore --filter "Category=GoldenSharedPng" --blame-hang-timeout 8m --blame-hang-dump-type none --logger "trx;LogFileName=golden_shared_png_tests.trx"

      - name: Upload golden shared PNG test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-shared-png-tests-windows
          retention-days: 5
          path: "**/*golden_shared_png_tests.trx"

  replay_tests:
    name: Replay Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}
          path: tests

      - name: Restore execute permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          find tests -path "*/bin/Release/net*" -type f \
            ! -name "*.dll" ! -name "*.json" ! -name "*.pdb" ! -name "*.xml" \
            ! -name "*.so" ! -name "*.dylib" ! -name "*.a" ! -name "*.txt" \
            | xargs chmod +x

      - name: Restore
        run: dotnet restore

      - name: Run Replay Tests
        env:
          PARITY_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/parity
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --no-restore --filter "Category=Replay" --blame-hang-timeout 8m --blame-hang-dump-type none --logger "trx;LogFileName=replay_tests.trx"

      - name: Prepare Replay Artifact Bundle
        if: always()
        shell: pwsh
        run: |
          $bundleDir = "artifacts/parity"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          "runner_os=${{ runner.os }}; matrix_os=${{ matrix.os }}; run_id=${{ github.run_id }}" |
            Set-Content -Path (Join-Path $bundleDir "_artifact_meta.txt")

      - name: Upload Replay Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-snapshots-${{ matrix.os }}
          retention-days: 5
          path: |
            artifacts/parity/*.snap
            artifacts/parity/**/*.snap
            artifacts/parity/_artifact_meta.txt
            **/*replay_tests.trx

  pty_smoke_tests:
    name: PTY Smoke Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}
          path: tests

      - name: Restore execute permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          find tests -path "*/bin/Release/net*" -type f \
            ! -name "*.dll" ! -name "*.json" ! -name "*.pdb" ! -name "*.xml" \
            ! -name "*.so" ! -name "*.dylib" ! -name "*.a" ! -name "*.txt" \
            | xargs chmod +x

      - name: Restore
        run: dotnet restore

      - name: Run PTY smoke tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --no-restore --filter "Category=PtySmoke" --blame-hang-timeout 8m --blame-hang-dump-type none --logger "trx;LogFileName=pty_smoke_tests.trx"

      - name: Upload PTY smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pty-smoke-${{ runner.os }}
          retention-days: 5
          path: "**/*pty_smoke_tests.trx"

  parity_compare:
    name: Cross-Platform Parity Compare
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    needs: [replay_tests]

    steps:
      - uses: actions/checkout@v4

      - name: Download snapshots (Windows)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-windows-latest
          path: parity/windows

      - name: Download snapshots (Linux)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-ubuntu-latest
          path: parity/linux

      - name: Inspect downloaded parity artifacts
        run: |
          echo "Downloaded files:"
          find parity -type f | sort || true
          echo "Snapshot counts:"
          echo "windows=$(find parity/windows -type f -name '*.snap' | wc -l)"
          echo "linux=$(find parity/linux -type f -name '*.snap' | wc -l)"

      - name: Compare snapshots for parity
        run: |
          python3 tests/tools/compare_snapshots.py parity/windows parity/linux

  render_metrics_tests:
    name: Render Metrics (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}
          path: tests

      - name: Restore execute permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          find tests -path "*/bin/Release/net*" -type f \
            ! -name "*.dll" ! -name "*.json" ! -name "*.pdb" ! -name "*.xml" \
            ! -name "*.so" ! -name "*.dylib" ! -name "*.a" ! -name "*.txt" \
            | xargs chmod +x

      - name: Restore
        run: dotnet restore

      - name: Run Render Metrics Tests
        env:
          WRITE_METRICS_ARTIFACTS: "1"
          METRICS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/metrics
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --no-restore --filter "Category=RenderMetrics" --blame-hang-timeout 8m --blame-hang-dump-type none --logger "trx;LogFileName=render_metrics.trx"

      - name: Upload render metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-metrics-${{ runner.os }}
          retention-days: 5
          path: |
            artifacts/metrics/**
            **/*render_metrics.trx

  tab_perf_smoke:
    name: Tab Perf Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-ubuntu-latest
          path: tests

      - name: Restore execute permissions
        run: |
          find tests -path "*/bin/Release/net*" -type f \
            ! -name "*.dll" ! -name "*.json" ! -name "*.pdb" ! -name "*.xml" \
            ! -name "*.so" ! -name "*.dylib" ! -name "*.a" ! -name "*.txt" \
            | xargs chmod +x

      - name: Restore
        run: dotnet restore

      - name: Run tab perf smoke
        env:
          WRITE_METRICS_ARTIFACTS: "1"
          METRICS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/metrics
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --no-restore --filter "Category=Performance|Category=Latency" --blame-hang-timeout 8m --blame-hang-dump-type none --logger "trx;LogFileName=tab_perf_smoke.trx"

      - name: Upload tab perf smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tab-perf-smoke
          retention-days: 5
          path: |
            **/*tab_perf_smoke.trx
            artifacts/metrics/**

  nightly_tab_stress:
    name: Nightly Tab Stress
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule'
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-ubuntu-latest
          path: tests

      - name: Restore execute permissions
        run: |
          find tests -path "*/bin/Release/net*" -type f \
            ! -name "*.dll" ! -name "*.json" ! -name "*.pdb" ! -name "*.xml" \
            ! -name "*.so" ! -name "*.dylib" ! -name "*.a" ! -name "*.txt" \
            | xargs chmod +x

      - name: Restore
        run: dotnet restore

      - name: Run stress lanes
        env:
          WRITE_METRICS_ARTIFACTS: "1"
          METRICS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/metrics
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --no-restore --filter "Category=Stress|Category=Performance|Category=Latency|Category=RenderMetrics" --blame-hang-timeout 8m --blame-hang-dump-type none --logger "trx;LogFileName=nightly_tab_stress.trx"

      - name: Upload nightly stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-tab-stress
          retention-days: 7
          path: |
            **/*nightly_tab_stress.trx
            artifacts/metrics/**

  aot_publish:
    name: AOT Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 40
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET SDK
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: dotnet-sdk-${{ runner.os }}-10.0.300
          restore-keys: dotnet-sdk-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ~/.dotnet
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}
          path: tests

      - name: Restore
        run: dotnet restore

      - name: Publish AOT
        run: dotnet publish src/NovaTerminal.App/NovaTerminal.App.csproj -c ${{ env.CONFIGURATION }} -r ${{ matrix.rid }} --self-contained true -p:PublishAot=true -o artifacts/publish/${{ matrix.rid }}

      - name: Upload AOT bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aot-${{ matrix.rid }}
          retention-days: 7
          path: artifacts/publish/${{ matrix.rid }}
