name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build_native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: NovaTerminal/native

      - name: Build Rust (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd NovaTerminal/native
          cargo build --release
          # Binary stays in target/release/rusty_pty.dll

      - name: Build Rust (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd NovaTerminal/native
          cargo build --release
          # Move to the special target_linux dir expected by csproj if needed
          # Actually, we can just move it to NovaTerminal/native/target_linux/release/
          mkdir -p ../native/target_linux/release
          cp target/release/librusty_pty.so ../native/target_linux/release/

      - name: Build Rust (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd NovaTerminal/native
          cargo build --release
          # Binary stays in target/release/librusty_pty.dylib

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: NovaTerminal/native/target*/**/release/*pty.*

  build_and_unit_tests:
    name: Build + Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build_native]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: NovaTerminal/native

      - name: Restore
        run: dotnet restore

      - name: Build (C#)
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test (unit)
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category!=Replay&Category!=RenderMetrics&Category!=PtySmoke" --logger "trx;LogFileName=unit_tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-${{ runner.os }}
          path: "**/*.trx"

  replay_tests:
    name: Replay Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build_and_unit_tests, build_native]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: NovaTerminal/native

      - name: Restore
        run: dotnet restore

      - name: Build (tests only)
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run Replay Tests
        env:
          PARITY_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/parity
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=Replay" --logger "trx;LogFileName=replay_tests.trx"

      - name: Upload Replay Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-snapshots-${{ runner.os }}
          path: |
            artifacts/parity/**/*.snap
            **/*replay_tests.trx

  pty_smoke_tests:
    name: PTY Smoke Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build_and_unit_tests, build_native]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: NovaTerminal/native

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run PTY smoke tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=PtySmoke" --logger "trx;LogFileName=pty_smoke_tests.trx"

      - name: Upload PTY smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pty-smoke-${{ runner.os }}
          path: "**/*pty_smoke_tests.trx"

  parity_compare:
    name: Cross-Platform Parity Compare
    runs-on: ubuntu-latest
    needs: [replay_tests]

    steps:
      - uses: actions/checkout@v4

      - name: Download snapshots (Windows)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-Windows
          path: parity/windows

      - name: Download snapshots (Linux)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-Linux
          path: parity/linux

      - name: Download snapshots (macOS)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-macOS
          path: parity/macos

      - name: Compare snapshots for parity
        run: |
          python3 tests/tools/compare_snapshots.py parity/windows parity/linux parity/macos

  render_metrics_tests:
    name: Render Metrics (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build_and_unit_tests, build_native]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: NovaTerminal/native

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run Render Metrics Tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=RenderMetrics" --logger "trx;LogFileName=render_metrics.trx"

      - name: Upload render metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-metrics-${{ runner.os }}
          path: |
            artifacts/metrics/**
            **/*render_metrics.trx

  aot_publish:
    name: AOT Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build_native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: NovaTerminal/native

      - name: Restore
        run: dotnet restore

      - name: Publish AOT
        run: dotnet publish NovaTerminal/NovaTerminal.csproj -c ${{ env.CONFIGURATION }} -r ${{ matrix.rid }} --self-contained true -p:PublishAot=true -o artifacts/publish/${{ matrix.rid }}

      - name: Upload AOT bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aot-${{ matrix.rid }}
          path: artifacts/publish/${{ matrix.rid }}
