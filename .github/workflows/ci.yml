name: CI

on:
  pull_request:
    paths-ignore:
      - "documents/**"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "documents/**"
      - "**/*.md"
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build_native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["windows-latest","ubuntu-latest","macos-latest"]') }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/NovaTerminal.App/native

      - name: Build Rust (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd src/NovaTerminal.App/native
          cargo build --release
          # Binary stays in target/release/rusty_pty.dll

      - name: Build Rust (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd src/NovaTerminal.App/native
          cargo build --release
          # Move to the special target_linux dir expected by csproj if needed
          # Actually, we can just move it to src/NovaTerminal.App/native/target_linux/release/
          mkdir -p ../native/target_linux/release
          cp target/release/librusty_pty.so ../native/target_linux/release/

      - name: Build Rust (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd src/NovaTerminal.App/native
          cargo build --release
          # Binary stays in target/release/librusty_pty.dylib

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: src/NovaTerminal.App/native/target*/**/release/*pty.*

  build_and_unit_tests:
    name: Build + Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    needs: [build_native]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["windows-latest","ubuntu-latest","macos-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: src/NovaTerminal.App/native

      - name: Restore
        run: dotnet restore

      - name: Build (C#)
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test (unit)
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category!=Replay&Category!=RenderMetrics&Category!=PtySmoke" --logger "trx;LogFileName=unit_tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-${{ runner.os }}
          retention-days: 5
          path: "**/*.trx"

  replay_tests:
    name: Replay Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request'
    timeout-minutes: 25
    needs: [build_and_unit_tests, build_native]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: src/NovaTerminal.App/native

      - name: Restore
        run: dotnet restore

      - name: Build (tests only)
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run Replay Tests
        env:
          PARITY_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/parity
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=Replay" --logger "trx;LogFileName=replay_tests.trx"

      - name: Prepare Replay Artifact Bundle
        if: always()
        shell: pwsh
        run: |
          $bundleDir = "artifacts/parity"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          "runner_os=${{ runner.os }}; matrix_os=${{ matrix.os }}; run_id=${{ github.run_id }}" |
            Set-Content -Path (Join-Path $bundleDir "_artifact_meta.txt")

      - name: Upload Replay Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-snapshots-${{ matrix.os }}
          retention-days: 5
          path: |
            artifacts/parity/*.snap
            artifacts/parity/**/*.snap
            artifacts/parity/_artifact_meta.txt
            **/*replay_tests.trx

  pty_smoke_tests:
    name: PTY Smoke Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    needs: [build_and_unit_tests, build_native]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: src/NovaTerminal.App/native

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run PTY smoke tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=PtySmoke" --logger "trx;LogFileName=pty_smoke_tests.trx"

      - name: Upload PTY smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pty-smoke-${{ runner.os }}
          retention-days: 5
          path: "**/*pty_smoke_tests.trx"

  parity_compare:
    name: Cross-Platform Parity Compare
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    needs: [replay_tests]

    steps:
      - uses: actions/checkout@v4

      - name: Download snapshots (Windows)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-windows-latest
          path: parity/windows

      - name: Download snapshots (Linux)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-ubuntu-latest
          path: parity/linux

      - name: Download snapshots (macOS)
        uses: actions/download-artifact@v4
        with:
          name: replay-snapshots-macos-latest
          path: parity/macos

      - name: Inspect downloaded parity artifacts
        run: |
          echo "Downloaded files:"
          find parity -type f | sort || true
          echo "Snapshot counts:"
          echo "windows=$(find parity/windows -type f -name '*.snap' | wc -l)"
          echo "linux=$(find parity/linux -type f -name '*.snap' | wc -l)"
          echo "macos=$(find parity/macos -type f -name '*.snap' | wc -l)"

      - name: Compare snapshots for parity
        run: |
          python3 tests/tools/compare_snapshots.py parity/windows parity/linux parity/macos

  render_metrics_tests:
    name: Render Metrics (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    needs: [build_and_unit_tests, build_native]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: src/NovaTerminal.App/native

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run Render Metrics Tests
        env:
          WRITE_METRICS_ARTIFACTS: "1"
          METRICS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/metrics
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=RenderMetrics" --logger "trx;LogFileName=render_metrics.trx"

      - name: Upload render metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-metrics-${{ runner.os }}
          retention-days: 5
          path: |
            artifacts/metrics/**
            **/*render_metrics.trx

  tab_perf_smoke:
    name: Tab Perf Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    needs: [build_and_unit_tests, build_native]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-ubuntu-latest
          path: src/NovaTerminal.App/native

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run tab perf smoke
        env:
          WRITE_METRICS_ARTIFACTS: "1"
          METRICS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/metrics
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=Performance|Category=Latency" --logger "trx;LogFileName=tab_perf_smoke.trx"

      - name: Upload tab perf smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tab-perf-smoke
          retention-days: 5
          path: |
            **/*tab_perf_smoke.trx
            artifacts/metrics/**

  nightly_tab_stress:
    name: Nightly Tab Stress
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule'
    needs: [build_and_unit_tests, build_native]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-ubuntu-latest
          path: src/NovaTerminal.App/native

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run stress lanes
        env:
          WRITE_METRICS_ARTIFACTS: "1"
          METRICS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/metrics
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=Stress|Category=Performance|Category=Latency|Category=RenderMetrics" --logger "trx;LogFileName=nightly_tab_stress.trx"

      - name: Upload nightly stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-tab-stress
          retention-days: 7
          path: |
            **/*nightly_tab_stress.trx
            artifacts/metrics/**

  aot_publish:
    name: AOT Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 40
    needs: [build_native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: src/NovaTerminal.App/native

      - name: Restore
        run: dotnet restore

      - name: Publish AOT
        run: dotnet publish src/NovaTerminal.App/NovaTerminal.App.csproj -c ${{ env.CONFIGURATION }} -r ${{ matrix.rid }} --self-contained true -p:PublishAot=true -o artifacts/publish/${{ matrix.rid }}

      - name: Upload AOT bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aot-${{ matrix.rid }}
          retention-days: 7
          path: artifacts/publish/${{ matrix.rid }}
