name: Nightly Stress

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  stress_replay_suite:
    name: Stress Replay Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      # Assumption: Category=ReplayStress runs larger fixtures and may take longer.
      - name: Run Stress Replay Tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "Category=ReplayStress" --logger "trx;LogFileName=replay_stress.trx"

      - name: Upload stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-stress-${{ matrix.os }}
          path: |
            artifacts/**
            **/*replay_stress.trx
