name: Nightly Stress

on:
  schedule:
    - cron: "0 2 * * 1-5" # 02:00 UTC weekdays
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run Windows stress jobs in addition to Linux"
        required: false
        default: false
        type: boolean

concurrency:
  group: nightly-stress-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  stress_replay_linux:
    name: Stress Replay Suite (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # Rust native PTY — mirrors ci.yml so dotnet build can copy librusty_pty.so.
      - name: Cache native binary
        id: native-bin-cache
        uses: actions/cache@v4
        with:
          path: |
            src/NovaTerminal.App/native/target/release
            src/NovaTerminal.App/native/target_linux/release
          key: native-bin-v2-ubuntu-latest-${{ hashFiles('src/NovaTerminal.App/native/src/**', 'src/NovaTerminal.App/native/Cargo.toml', 'src/NovaTerminal.App/native/Cargo.lock') }}

      - name: Install Rust
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust incremental build cache
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/NovaTerminal.App/native

      - name: Build Rust (Linux)
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        run: |
          cd src/NovaTerminal.App/native
          cargo build --release
          mkdir -p target_linux/release
          cp target/release/librusty_pty.so target_linux/release/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run Stress and Performance Tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "(Category=Stress|Category=Performance|Category=Latency)" --logger "trx;LogFileName=replay_stress.trx"

      - name: Upload stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-stress-ubuntu-latest
          retention-days: 5
          if-no-files-found: warn
          path: |
            artifacts/**
            **/*replay_stress.trx

  fuzz_vt:
    name: Fuzz VT (AnsiParser + reflow)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # The fuzz target only references NovaTerminal.VT — no native/Rust build needed.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install clang (libFuzzer driver)
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install SharpFuzz tool
        run: dotnet tool install --global SharpFuzz.CommandLine

      - name: Build libfuzzer-dotnet driver
        run: |
          wget -q https://raw.githubusercontent.com/Metalnem/libfuzzer-dotnet/master/libfuzzer-dotnet.cc
          clang -fsanitize=fuzzer libfuzzer-dotnet.cc -o libfuzzer-dotnet

      - name: Publish fuzz project
        run: dotnet publish tests/NovaTerminal.Benchmarks -c ${{ env.CONFIGURATION }} -o fuzz-bin

      - name: Instrument NovaTerminal.VT
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          sharpfuzz fuzz-bin/NovaTerminal.VT.dll

      # Persist the corpus between nightly runs so coverage accumulates.
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: |
            corpus-parser
            corpus-resize
          key: fuzz-corpus-v1-${{ github.run_id }}
          restore-keys: fuzz-corpus-v1-

      - name: Fuzz AnsiParser (parser target, 10 min)
        run: |
          mkdir -p corpus-parser crashes
          ./libfuzzer-dotnet --target_path=fuzz-bin/NovaTerminal.Benchmarks --target_arg=--fuzz \
            -timeout=25 -max_total_time=600 -artifact_prefix=crashes/parser- corpus-parser

      - name: Fuzz parse + resize (reflow target, 10 min)
        run: |
          mkdir -p corpus-resize crashes
          ./libfuzzer-dotnet --target_path=fuzz-bin/NovaTerminal.Benchmarks --target_arg=--fuzz-resize \
            -timeout=25 -max_total_time=600 -artifact_prefix=crashes/resize- corpus-resize

      # Any libFuzzer crash/hang fails the step above and leaves a reproducing input in crashes/.
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          retention-days: 14
          if-no-files-found: ignore
          path: crashes/

  stress_replay_extra:
    name: Stress Replay Suite (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Rust native PTY — Windows-only branch; csproj reads from native/target/release directly.
      - name: Cache native binary
        id: native-bin-cache
        uses: actions/cache@v4
        with:
          path: src/NovaTerminal.App/native/target/release
          key: native-bin-${{ matrix.os }}-${{ hashFiles('src/NovaTerminal.App/native/src/**', 'src/NovaTerminal.App/native/Cargo.toml', 'src/NovaTerminal.App/native/Cargo.lock') }}

      - name: Install Rust
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust incremental build cache
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/NovaTerminal.App/native

      - name: Build Rust (Windows)
        if: steps.native-bin-cache.outputs.cache-hit != 'true'
        run: cd src/NovaTerminal.App/native && cargo build --release

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      - name: Run Stress and Performance Tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --filter "(Category=Stress|Category=Performance|Category=Latency)" --logger "trx;LogFileName=replay_stress.trx"

      - name: Upload stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-stress-${{ matrix.os }}
          retention-days: 5
          if-no-files-found: warn
          path: |
            artifacts/**
            **/*replay_stress.trx
